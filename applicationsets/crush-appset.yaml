apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: crush-appset
  namespace: argocd

spec:
  generators:
    - list:
        elements:
          - env: dev
          - env: stage
          - env: prod

  template:
    metadata:
      name: '{{env}}-crush-app'

    spec:
      project: default

      source:
        repoURL: https://github.com/KaleeswarG25/crush-gitops.git
        targetRevision: HEAD
        path: charts/crush-app

        helm:
          valueFiles:
            - ../../environments/{{env}}/values.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{env}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true